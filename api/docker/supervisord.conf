[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/run/supervisord.pid
user=root

[program:php-fpm]
command=php-fpm --nodaemonize --fpm-config /usr/local/etc/php-fpm.conf
autostart=true
autorestart=true
priority=10
stderr_logfile=/var/log/supervisor/php-fpm.err
stdout_logfile=/var/log/supervisor/php-fpm.out

[program:nginx]
command=nginx -g "daemon off;" -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
priority=20
stderr_logfile=/var/log/supervisor/nginx.err
stdout_logfile=/var/log/supervisor/nginx.out
