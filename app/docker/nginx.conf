server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets versionados (JS, CSS, fuentes)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cachear index.html para que siempre levante la versión nueva
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml;

    # Ocultar versión de nginx
    server_tokens off;
}
